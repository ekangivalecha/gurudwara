<!DOCTYPE html>
<html>
<head>
    <title>For Ankit</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
            font-size: 30px;
        }

        p {
            font-size: 18px;
        }

        .btn {
            padding: 12px 22px;
            margin: 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #yes {
            background: #22c55e;
            color: white;
        }

        #no {
            background: #ef4444;
            color: white;
            position: absolute;
        }
    </style>
</head>

<body>

<h1>Ankit… can we meet once? 🙏</h1>

<p>
I know things got messy… and I’m really sorry for my part in it.
</p>

<p>
I’m not here to argue or force anything.
Just one calm moment.
</p>

<p>
Monday, 12:30 PM<br>
I’ll be at the metro station.
</p>

<p>
We can go to Gurudwara together… or just sit quietly.
</p>

<button id="yes" class="btn">I’ll come</button>
<button id="no" class="btn">I can’t</button>

<script>
let noClickCount = 0;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

noBtn.addEventListener("click", function() {
    noClickCount++;

    if (noClickCount < 3) {
        let x = Math.random() * window.innerWidth;
        let y = Math.random() * window.innerHeight;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    } else {
        document.body.innerHTML = `
        <h1>I understand.</h1>
        <p>I won’t force anything.</p>
        <p>I’ll still be there at 12:30… just in case.</p>
        `;
    }
});

yesBtn.addEventListener("click", function() {
    document.body.innerHTML = `
    <h1>Thank you 🤍</h1>
    <p>I’ll be waiting at 12:30.</p>
    `;

    // optional tracking
    fetch("https://formspree.io/f/your-id", {
        method: "POST",
        body: JSON.stringify({ response: "YES" }),
        headers: {
            "Content-Type": "application/json"
        }
    });
});
</script>

</body>
</html>
