<!DOCTYPE html>
<html>
<head>
    <title>For Ankit</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        .btn {
            padding: 12px 22px;
            margin: 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #yes { background: #22c55e; }
        #no { background: #ef4444; position: absolute; }
    </style>
</head>

<body>

<div class="container">
    <h1 id="typing"></h1>

    <p>I know things got messy… and I’m really sorry.</p>
    <p>I’m not here to argue or force anything.</p>
    <p>Just one calm moment.</p>
    <p>Monday, 12:30 PM – I’ll be at the metro station.</p>
    <p>We can go to Gurudwara together… or just sit quietly.</p>

    <button id="yes" class="btn">I’ll come</button>
    <button id="no" class="btn">I can’t</button>
</div>

<script>
// typing effect FIXED
let text = "Ankit… can we meet once? 🙏";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

// buttons
let noClickCount = 0;
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

// NO button move
noBtn.addEventListener("click", function() {
    noClickCount++;

    if (noClickCount < 3) {
        let x = Math.random() * window.innerWidth;
        let y = Math.random() * window.innerHeight;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    } else {
        document.body.innerHTML = `
        <h1>I understand.</h1>
        <p>I won’t force anything.</p>
        <p>I’ll still be there at 12:30… just in case.</p>
        `;
    }
});

// YES → WhatsApp (PUT YOUR NUMBER)
yesBtn.addEventListener("click", function() {
    window.location.href = "https://wa.me/91XXXXXXXXXX?text=Okay%20I’ll%20come%20at%2012:30";
});
</script>

</body>
</html>
